id: hl7.fhir.us.codex-mopa
canonical: http://hl7.org/fhir/us/codex-mopa
name: MOPAIG
title: MOPA — Medical Oncology Prior Authorization
description: >-
  Informative Medical Oncology Prior Authorization (MOPA) framework covering all cancer types and
  documenting upstream proposal gaps for Da Vinci CRD/DTR/PAS and mCODE. The guide uses breast
  cancer prior authorization as the first concrete use case and data requirements implementation.
