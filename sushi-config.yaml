id: hl7.fhir.us.codex-ocpa
canonical: http://hl7.org/fhir/us/codex-ocpa
name: CodexOCPAIG
title: OCPA Implementation Guide
description: >-
  Standards-based oncology prior authorization (OCPA) framework extending Da Vinci
  CRD/DTR/PAS with mCODE patient context and computable anti-cancer regimen
  representation. Lead use case: breast cancer prior authorization.
